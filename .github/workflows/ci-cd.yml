name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore SmartLogistics.sln

      - name: Build
        run: dotnet build SmartLogistics.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test SmartLogistics.sln --configuration Release --no-build --verbosity normal
        continue-on-error: true # No tests yet — placeholder

  docker-build:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: gateway
            dockerfile: docker/Dockerfile.gateway
            image: smart-logistics-gateway
          - name: shipment-api
            dockerfile: docker/Dockerfile.shipment-api
            image: smart-logistics-shipment-api
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest

  # TODO: Deploy to AKS/EKS after image push
