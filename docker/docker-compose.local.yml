# Legacy overlay — prefer root compose.yaml instead:
#   docker compose up --build -d
#
# This file is kept for infra-only + APIs without rebuilding web:
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.local.yml up --build -d

x-service-env: &service-env
  OpenTelemetry__JaegerEndpoint: http://jaeger:4317
  Seq__ServerUrl: http://seq:5341
  Elasticsearch__Url: http://elasticsearch:9200
  ConnectionStrings__Redis: redis:6379

services:
  shipment-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.shipment-api
    container_name: smartlogistics-shipment-api
    environment:
      <<: *service-env
      ASPNETCORE_ENVIRONMENT: Docker
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - smart-logistics-platform

  tariff-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.tariff-api
    container_name: smartlogistics-tariff-api
    environment:
      <<: *service-env
      ASPNETCORE_ENVIRONMENT: Docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smart-logistics-platform

  billing-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.billing-api
    container_name: smartlogistics-billing-api
    environment:
      <<: *service-env
      ASPNETCORE_ENVIRONMENT: Docker
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - smart-logistics-platform

  notification-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.notification-api
    container_name: smartlogistics-notification-api
    environment:
      <<: *service-env
      ASPNETCORE_ENVIRONMENT: Docker
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - smart-logistics-platform

  ai-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ai-api
    container_name: smartlogistics-ai-api
    environment:
      <<: *service-env
      ASPNETCORE_ENVIRONMENT: Docker
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - smart-logistics-platform

  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
    container_name: smartlogistics-gateway
    environment:
      <<: *service-env
      ASPNETCORE_ENVIRONMENT: Docker
    ports:
      - "5000:8080"
    depends_on:
      - shipment-api
      - tariff-api
      - billing-api
      - notification-api
      - ai-api
      - keycloak
      - redis
      - jaeger
    networks:
      - smart-logistics-platform

networks:
  smart-logistics-platform:
    name: smart-logistics-platform
