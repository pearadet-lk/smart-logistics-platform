# Smart Logistics Platform — full stack (one command)
#
# From repository root:
#   docker compose up --build -d
#
# Or use scripts:
#   ./scripts/docker-deploy.ps1   (Windows)
#   ./scripts/docker-deploy.sh    (Linux/macOS)
#
# Stop:
#   docker compose down

name: smart-logistics-platform

x-service-env: &service-env
  OpenTelemetry__JaegerEndpoint: http://jaeger:4317
  Seq__ServerUrl: http://seq:5341
  Elasticsearch__Url: http://elasticsearch:9200
  ConnectionStrings__Redis: redis:6379

services:
  # --- Infrastructure ---
  postgres:
    image: postgres:16-alpine
    container_name: smartlogistics-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - smart-logistics-platform

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: smartlogistics-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KC_HOSTNAME: localhost
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./infrastructure/keycloak/SmartLogistics-realm.json:/opt/keycloak/data/import/SmartLogistics-realm.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smart-logistics-platform

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: smartlogistics-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep -q Mode"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - smart-logistics-platform

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: smartlogistics-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - smart-logistics-platform

  redis:
    image: redis:7-alpine
    container_name: smartlogistics-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - smart-logistics-platform

  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    container_name: smartlogistics-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
    networks:
      - smart-logistics-platform

  seq:
    image: datalust/seq:latest
    container_name: smartlogistics-seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "5341:5341"
      - "8081:80"
    volumes:
      - seq-data:/data
    networks:
      - smart-logistics-platform

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: smartlogistics-elasticsearch
    hostname: elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      node.name: elasticsearch
      network.host: 0.0.0.0
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9201:9200"
    networks:
      - smart-logistics-platform

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: smartlogistics-kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - smart-logistics-platform

  grafana:
    image: grafana/grafana:11.2.0
    container_name: smartlogistics-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - jaeger
    networks:
      - smart-logistics-platform

  # --- .NET microservices ---
  shipment-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.shipment-api
    container_name: smartlogistics-shipment-api
    restart: unless-stopped
    environment:
      <<: *service-env
      ASPNETCORE_ENVIRONMENT: Docker
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - smart-logistics-platform

  tariff-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.tariff-api
    container_name: smartlogistics-tariff-api
    restart: unless-stopped
    environment:
      <<: *service-env
      ASPNETCORE_ENVIRONMENT: Docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smart-logistics-platform

  billing-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.billing-api
    container_name: smartlogistics-billing-api
    restart: unless-stopped
    environment:
      <<: *service-env
      ASPNETCORE_ENVIRONMENT: Docker
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - smart-logistics-platform

  notification-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.notification-api
    container_name: smartlogistics-notification-api
    restart: unless-stopped
    environment:
      <<: *service-env
      ASPNETCORE_ENVIRONMENT: Docker
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - smart-logistics-platform

  ai-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.ai-api
    container_name: smartlogistics-ai-api
    restart: unless-stopped
    environment:
      <<: *service-env
      ASPNETCORE_ENVIRONMENT: Docker
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - smart-logistics-platform

  tracking-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.tracking-api
    container_name: smartlogistics-tracking-api
    restart: unless-stopped
    environment:
      <<: *service-env
      ASPNETCORE_ENVIRONMENT: Docker
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - smart-logistics-platform

  reporting-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.reporting-api
    container_name: smartlogistics-reporting-api
    restart: unless-stopped
    environment:
      <<: *service-env
      ASPNETCORE_ENVIRONMENT: Docker
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smart-logistics-platform

  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    container_name: smartlogistics-gateway
    restart: unless-stopped
    environment:
      <<: *service-env
      ASPNETCORE_ENVIRONMENT: Docker
    ports:
      - "5000:8080"
    depends_on:
      - shipment-api
      - tariff-api
      - billing-api
      - notification-api
      - ai-api
      - tracking-api
      - reporting-api
      - keycloak
      - redis
      - jaeger
    networks:
      - smart-logistics-platform

  # --- Angular SPA (nginx) ---
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: smartlogistics-web
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - gateway
      - keycloak
    networks:
      - smart-logistics-platform

networks:
  smart-logistics-platform:
    name: smart-logistics-platform

volumes:
  postgres-data:
  seq-data:
