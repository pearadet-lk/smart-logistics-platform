apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipment-api
  namespace: smartlogistics-local
  labels:
    app: shipment-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shipment-api
  template:
    metadata:
      labels:
        app: shipment-api
    spec:
      containers:
        - name: shipment-api
          image: smartlogistics/shipment-api:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Docker
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: ConnectionStrings__ShipmentDB
              value: Host=postgres;Port=5432;Database=ShipmentDB;Username=postgres;Password=postgres
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: shipment-api
  namespace: smartlogistics-local
spec:
  selector:
    app: shipment-api
  ports:
    - port: 80
      targetPort: 8080
---
