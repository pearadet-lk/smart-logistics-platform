spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: shipment-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
